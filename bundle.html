/* ============================================================ */
/*  db.js
/* ============================================================ */
// db.js — wraps the Supabase client and the auth session.
// Uses Supabase's official ESM build straight from the CDN — no npm, no bundler.

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const STORE_KEY = 'bizmgr.creds.v1';

let client = null;
let cachedProfile = null;

// ------------- credentials -------------

/** Read saved credentials (or null).
 *  Priority:
 *    1. localStorage  — set by the wizard / Settings page
 *    2. window.BIZMGR_CONFIG — provided by credentials/config.js if the user
 *       wants the app to auto-connect on startup with no wizard.
 */
function getCreds() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.url && parsed.key) return { ...parsed, source: 'browser' };
    }
  } catch {}
  if (typeof window !== 'undefined' && window.BIZMGR_CONFIG) {
    const c = window.BIZMGR_CONFIG;
    if (c.url && c.key) return { url: c.url, key: c.key, source: 'config-file' };
  }
  return null;
}

function isConfigSourced() {
  const c = getCreds();
  return !!(c && c.source === 'config-file');
}

function setCreds({ url, key }) {
  localStorage.setItem(STORE_KEY, JSON.stringify({ url, key }));
  client = createClient(url, key);
  cachedProfile = null;
  return client;
}

function clearCreds() {
  localStorage.removeItem(STORE_KEY);
  client = null;
  cachedProfile = null;
}

/** Get the live client. Throws if no creds saved yet. */
function db() {
  if (client) return client;
  const c = getCreds();
  if (!c) throw new Error('No database credentials yet. Open Settings to set them up.');
  client = createClient(c.url, c.key, {
    auth: { persistSession: true, autoRefreshToken: true }
  });
  return client;
}

/** Quick connection check. Doesn't require login — just hits the schema. */
async function testConnection(url, key) {
  try {
    const tmp = createClient(url, key);
    // We just need to know the tables exist. select('id') will fail
    // for an unauthenticated user if RLS is on — that's still proof the
    // table exists. Anything other than "table missing" is OK.
    const tables = ['profiles', 'customers', 'expenses', 'loans', 'chits'];
    for (const t of tables) {
      const { error } = await tmp.from(t).select('id').limit(1);
      if (error && /does not exist|not found|relation .* does not exist/i.test(error.message)) {
        return {
          ok: false,
          message: `Table "${t}" is missing. Run supabase-schema.sql in the SQL editor first. (${error.message})`
        };
      }
    }
    return { ok: true, message: 'Connected. Schema looks correct.' };
  } catch (e) {
    return { ok: false, message: e.message || String(e) };
  }
}

// ------------- auth -------------

async function getSession() {
  const { data } = await db().auth.getSession();
  return data.session || null;
}

async function signUp(email, password, fullName) {
  const supabase = db();
  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: { data: { full_name: fullName || '' } }
  });
  if (error) throw error;
  return data;
}

async function signIn(email, password) {
  const supabase = db();
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) throw error;
  cachedProfile = null;
  return data;
}

async function signOut() {
  await db().auth.signOut();
  cachedProfile = null;
}

async function sendReset(email) {
  const { error } = await db().auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + location.pathname
  });
  if (error) throw error;
}

/** Returns { user, profile } for the currently-signed-in user, or null. */
async function getMe() {
  if (cachedProfile) return cachedProfile;
  const session = await getSession();
  if (!session) return null;
  const { data, error } = await db()
    .from('profiles')
    .select('id, email, full_name, role')
    .eq('id', session.user.id)
    .maybeSingle();
  // If the profile row hasn't propagated yet (rare timing on first signup), we
  // synthesize one rather than failing the whole app.
  const profile = data || { id: session.user.id, email: session.user.email, role: 'customer' };
  if (error) console.warn('getMe profile fetch warning:', error.message);
  cachedProfile = { user: session.user, profile };
  return cachedProfile;
}

/** Subscribe to login/logout events. Returns an unsubscribe function. */
function onAuthChange(cb) {
  const supabase = db();
  const { data } = supabase.auth.onAuthStateChange(() => {
    cachedProfile = null;
    cb();
  });
  return () => data.subscription.unsubscribe();
}

// ui.js — tiny helpers shared by every page.

/** Render trusted HTML into a target element. */
function mount(target, html) {
  target.innerHTML = html;
  target.classList.add('page-enter');
  // re-trigger the css animation on every page change
  void target.offsetWidth;
}

/** Build an HTML string safely-ish: escapes anything passed as ${value}. */
function esc(v) {
  if (v === null || v === undefined) return '';
  return String(v)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

/** Format a number as Indian rupees. */
function inr(n) {
  const v = Number(n) || 0;
  return '₹' + v.toLocaleString('en-IN');
}

/** Format an ISO date as a friendly local date. */
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString();
}

/** Return today's date in YYYY-MM-DD form. */
function today() {
  return new Date().toISOString().slice(0, 10);
}

/** Show a green/red toast in the top-right. */
function toast(message, type = 'success') {
  const el = document.createElement('div');
  const colors = {
    success: 'bg-green-600',
    error:   'bg-red-600',
    info:    'bg-slate-700'
  };
  el.className = `${colors[type] || colors.info} fixed top-4 right-4 z-[60] text-white px-4 py-2 rounded-lg shadow-lg`;
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .3s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

/**
 * Open a modal. `bodyHtml` is rendered inside.
 * Returns { close }. Use data-modal-close on any button to close.
 */
function openModal({ title, bodyHtml, onMount }) {
  const wrap = document.createElement('div');
  wrap.className = 'modal-backdrop';
  wrap.innerHTML = `
    <div class="card w-full max-w-md" style="max-height:90vh; overflow-y:auto;">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">${esc(title)}</h3>
        <button class="btn btn-ghost" data-modal-close aria-label="Close">✕</button>
      </div>
      <div data-modal-body>${bodyHtml}</div>
    </div>
  `;
  const close = () => wrap.remove();
  wrap.addEventListener('click', (e) => {
    if (e.target === wrap) close();
    if (e.target.closest('[data-modal-close]')) close();
  });
  document.body.appendChild(wrap);
  if (onMount) onMount(wrap.querySelector('[data-modal-body]'), close);
  return { close };
}

/** Friendly confirm dialog (replacement for window.confirm). */
function confirm(message) {
  return new Promise((resolve) => {
    openModal({
      title: 'Are you sure?',
      bodyHtml: `
        <p class="mb-6 text-slate-600 dark:text-slate-300">${esc(message)}</p>
        <div class="flex justify-end gap-2">
          <button class="btn btn-ghost" data-no>Cancel</button>
          <button class="btn btn-danger" data-yes>Yes, do it</button>
        </div>
      `,
      onMount(body, close) {
        body.querySelector('[data-no]').onclick = () => { close(); resolve(false); };
        body.querySelector('[data-yes]').onclick = () => { close(); resolve(true); };
      }
    });
  });
}

/*  setup.js  →  exports renderSetup
/* ============================================================ */
const renderSetup = (() => {
// setup.js — friendly one-page wizard for entering Supabase credentials.
// Three steps:
//   1. "Why do I need this?" intro
//   2. Form (URL + anon key) with a Test Connection button
//   3. Saved → click to enter the app


function renderSetup(target, { onDone }) {
  // Pre-fill from any saved values so users can easily edit
  const existing = getCreds() || { url: '', key: '' };
  const fromConfig = isConfigSourced();

  mount(target, `
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="card w-full max-w-lg">
        <div class="flex items-center gap-3 mb-2">
          <div class="w-10 h-10 rounded-lg bg-primary text-white flex items-center justify-center font-bold text-xl">B</div>
          <h1 class="text-2xl font-bold">Connect your database</h1>
        </div>
        <p class="text-sm text-slate-600 dark:text-slate-300 mb-4">
          BizManager Lite stores your business data in <b>your own</b> free Supabase project.
          You only need to do this once on each device.
          <a href="SETUP_GUIDE.md" target="_blank" class="text-primary underline">Step-by-step guide</a>.
        </p>

        ${fromConfig ? `
          <div class="mb-4 p-3 rounded-lg text-sm bg-blue-50 text-blue-900 dark:bg-blue-900/30 dark:text-blue-100">
            ✨ Values loaded from <code>credentials/config.js</code>. Click
            <b>Save &amp; continue</b> to use them, or edit below to override.
          </div>` : ''}

        <form id="setup-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">1. Supabase Project URL</label>
            <input id="url" class="field" type="url"
                   value="${esc(existing.url)}"
                   placeholder="https://xxxxxxxx.supabase.co" required />
            <p class="text-xs text-slate-500 mt-1">
              Found in Supabase ▸ Project Settings ▸ Data API ▸ <i>Project URL</i>.
            </p>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">2. Public anon key</label>
            <input id="key" class="field" type="password"
                   value="${esc(existing.key)}"
                   placeholder="eyJhbGciOi..." required />
            <p class="text-xs text-slate-500 mt-1">
              Same page, labelled <i>anon public</i>. It is safe to use in the browser
              <b>only because</b> the schema enables Row Level Security.
            </p>
            <label class="text-xs flex items-center gap-1 mt-1 cursor-pointer">
              <input type="checkbox" id="show-key" /> Show key
            </label>
          </div>

          <div id="status" class="text-sm hidden"></div>

          <div class="flex flex-wrap gap-2 justify-end pt-2">
            <button type="button" id="test-btn" class="btn btn-ghost">Test connection</button>
            <button type="submit" class="btn btn-primary">Save &amp; continue</button>
          </div>
        </form>

        <details class="mt-6 text-sm">
          <summary class="cursor-pointer text-slate-600 dark:text-slate-300">
            I haven't created a Supabase project yet
          </summary>
          <ol class="list-decimal pl-6 mt-2 space-y-1 text-slate-600 dark:text-slate-300">
            <li>Go to <a href="https://supabase.com" target="_blank" class="text-primary underline">supabase.com</a> and sign in (free).</li>
            <li>Click <b>New Project</b>. Give it any name and password, pick the closest region.</li>
            <li>Open <b>SQL Editor ▸ New query</b>. Paste the file <code>supabase-schema.sql</code> from this app and click <b>Run</b>.</li>
            <li>Back here, paste the URL and the <i>anon public</i> key.</li>
          </ol>
        </details>
      </div>
    </div>
  `);

  const $ = (id) => target.querySelector(id);
  const status = $('#status');
  const showStatus = (msg, ok) => {
    status.className = 'text-sm p-3 rounded-lg ' +
      (ok ? 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-200'
          : 'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-200');
    status.textContent = msg;
    status.classList.remove('hidden');
  };

  $('#show-key').onchange = (e) => {
    $('#key').type = e.target.checked ? 'text' : 'password';
  };

  $('#test-btn').onclick = async () => {
    const url = $('#url').value.trim();
    const key = $('#key').value.trim();
    if (!url || !key) {
      showStatus('Fill in both fields first.', false);
      return;
    }
    showStatus('Testing…', true);
    const r = await testConnection(url, key);
    showStatus(r.message, r.ok);
  };

  $('#setup-form').onsubmit = async (e) => {
    e.preventDefault();
    const url = $('#url').value.trim();
    const key = $('#key').value.trim();
    showStatus('Testing before saving…', true);
    const r = await testConnection(url, key);
    if (!r.ok) {
      showStatus(r.message, false);
      return;
    }
    setCreds({ url, key });
    toast('Connected!', 'success');
    onDone();
  };
}
  return renderSetup;
})();

const renderLogin = (() => {
// login.js — email + password login / signup / forgot-password.


function renderLogin(target, { onDone }) {
  let mode = 'login'; // 'login' | 'signup' | 'reset'

  function paint() {
    const titles = {
      login:  'Sign in',
      signup: 'Create your account',
      reset:  'Forgot your password?',
    };
    const submit = {
      login:  'Sign in',
      signup: 'Sign up',
      reset:  'Send reset link',
    };

    mount(target, `
      <div class="min-h-screen flex items-center justify-center p-4">
        <div class="card w-full max-w-md">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-lg bg-primary text-white flex items-center justify-center font-bold text-xl">B</div>
            <h1 class="text-2xl font-bold">${titles[mode]}</h1>
          </div>
          <p class="text-sm text-slate-600 dark:text-slate-300 mb-6">
            ${mode === 'signup'
              ? 'The very first account in this database becomes the admin. Everyone after that is a customer until an admin promotes them.'
              : mode === 'reset'
                ? 'Enter your email and Supabase will send you a link to set a new password.'
                : 'Use the email and password you signed up with.'
            }
          </p>

          <form id="f" class="space-y-3">
            ${mode === 'signup' ? `
              <div><label class="text-sm">Your name</label>
                   <input class="field" name="full_name" placeholder="Optional"></div>` : ''}

            <div><label class="text-sm">Email</label>
                 <input class="field" name="email" type="email" autocomplete="email" required></div>

            ${mode !== 'reset' ? `
              <div><label class="text-sm">Password</label>
                   <input class="field" name="password" type="password" autocomplete="${mode === 'signup' ? 'new-password' : 'current-password'}" minlength="6" required></div>` : ''}

            <div id="msg" class="text-sm hidden"></div>

            <button class="btn btn-primary w-full justify-center">${submit[mode]}</button>
          </form>

          <div class="flex flex-wrap gap-3 justify-between text-sm mt-4">
            ${mode !== 'login'  ? `<button data-mode="login"  class="text-primary hover:underline">Have an account? Sign in</button>` : ''}
            ${mode !== 'signup' ? `<button data-mode="signup" class="text-primary hover:underline">New here? Sign up</button>` : ''}
            ${mode !== 'reset'  ? `<button data-mode="reset"  class="text-primary hover:underline">Forgot password?</button>` : ''}
          </div>
        </div>
      </div>
    `);

    target.querySelectorAll('[data-mode]').forEach((b) =>
      b.onclick = () => { mode = b.dataset.mode; paint(); });

    target.querySelector('#f').onsubmit = async (e) => {
      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target));
      const msg = target.querySelector('#msg');
      const showMsg = (text, ok) => {
        msg.classList.remove('hidden');
        msg.className = 'text-sm p-3 rounded-lg ' +
          (ok ? 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-200'
              : 'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-200');
        msg.textContent = text;
      };
      try {
        if (mode === 'login') {
          await signIn(fd.email.trim(), fd.password);
          toast('Welcome back!');
          onDone();
        } else if (mode === 'signup') {
          await signUp(fd.email.trim(), fd.password, fd.full_name);
          showMsg('Account created. Check your email if confirmation is required, then sign in.', true);
          mode = 'login'; setTimeout(paint, 1500);
        } else {
          await sendReset(fd.email.trim());
          showMsg('Reset link sent. Check your inbox.', true);
        }
      } catch (err) {
        showMsg(err.message || String(err), false);
      }
    };
  }

  paint();
}
  return renderLogin;
})();

const renderHome = (() => {
// Home — dashboard summary across daily business, chits, expenses and loans.


async function renderHome(target, ctx) {
  mount(target, `<div class="text-slate-500">Loading dashboard…</div>`);
  const supabase = db();

  const [cust, custTx, expenses, loans, loanTx, chits, chitMembers, chitTx] = await Promise.all([
    supabase.from('customers').select('*'),
    supabase.from('customer_transactions').select('*'),
    supabase.from('expenses').select('*'),
    supabase.from('loans').select('*'),
    supabase.from('loan_transactions').select('*'),
    supabase.from('chits').select('*'),
    supabase.from('chit_members').select('id, chit_id'),
    supabase.from('chit_transactions').select('*'),
  ]);

  const given     = sum(custTx.data, 'Given');
  const received  = sum(custTx.data, 'Received');
  const income    = sum(expenses.data, 'Income', 'amount', 'type');
  const expense   = sum(expenses.data, 'Expense', 'amount', 'type');
  const loanGiven = (loans.data || []).filter((l) => l.type === 'Given').reduce((s, l) => s + Number(l.principal || 0), 0);
  const loanTaken = (loans.data || []).filter((l) => l.type === 'Taken').reduce((s, l) => s + Number(l.principal || 0), 0);
  const loanPaid  = sum(loanTx.data, 'Payment');
  const chitCollected = sum(chitTx.data, 'Given');
  const chitGiven     = sum(chitTx.data, 'Received');

  const me = ctx?.me?.profile;

  const cards = [
    { label: 'Daily Business — open',  value: inr(given - received),                         icon: '👥', color: 'bg-blue-500' },
    { label: 'Net household',          value: inr(income - expense),                         icon: '💰', color: 'bg-violet-500' },
    { label: 'Loan balance',           value: inr((loanTaken + loanGiven) - loanPaid),       icon: '🏦', color: 'bg-amber-500' },
    { label: 'Chit savings',           value: inr(chitCollected - chitGiven),                icon: '🎟️', color: 'bg-emerald-500' },
  ];

  const recent = [
    ...(custTx.data || []).map((t) => ({ date: t.date, label: `Daily business · ${t.type}`, amount: t.amount, neg: t.type === 'Received' })),
    ...(expenses.data || []).map((t) => ({ date: t.expense_date, label: `${t.type}: ${t.description}`, amount: t.amount, neg: t.type === 'Expense' })),
    ...(loanTx.data || []).map((t) => ({ date: t.date, label: `Loan · ${t.type}`, amount: t.amount, neg: t.type === 'Disbursement' })),
    ...(chitTx.data || []).map((t) => ({ date: t.date, label: `Chit · ${t.type}`, amount: t.amount, neg: t.type === 'Received' })),
  ].sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 8);

const renderCustomers = (() => {
// Customers — list + add/edit/delete + view transactions per customer.

  const supabase = db();

const renderChits = (() => {

async function draw(target, ctx, search = '') {
  mount(target, `<div class="text-slate-500">Loading chits…</div>`);
  const supabase = db();

  // We pull every chit + every chit_member + every chit_transaction so that the
  // little summary on each row (collected / given) is accurate.
  const [{ data: chits = [] }, { data: members = [] }, { data: txs = [] }] = await Promise.all([
    supabase.from('chits').select('*').order('created_at', { ascending: false }),
    supabase.from('chit_members').select('id, chit_id'),
    supabase.from('chit_transactions').select('member_id, amount, type'),
  ]);

  // chitId -> { collected, given, members }
  const memberById = Object.fromEntries(members.map((m) => [m.id, m]));
  const stats = {};
  for (const t of txs) {
    const m = memberById[t.member_id];
    if (!m) continue;
    stats[m.chit_id] ??= { collected: 0, given: 0 };
    if (t.type === 'Given')    stats[m.chit_id].collected += Number(t.amount);
    if (t.type === 'Received') stats[m.chit_id].given     += Number(t.amount);
  }

  const enriched = chits.map((c) => ({
    ...c,
    member_count: members.filter((m) => m.chit_id === c.id).length,
    collected:    stats[c.id]?.collected || 0,
    given:        stats[c.id]?.given     || 0,
  }));

  const filtered = search
    ? enriched.filter((c) => c.name.toLowerCase().includes(search.toLowerCase()))
    : enriched;

  const totalCollected = enriched.reduce((s, c) => s + c.collected, 0);
  const totalGiven     = enriched.reduce((s, c) => s + c.given, 0);
  const ongoing        = enriched.filter((c) => c.status === 'Ongoing').length;

  mount(target, `

        <button id="add" class="btn btn-primary">+ New chit</button>
      </div>

      <div class="overflow-x-auto">
        <table class="tbl">
          <thead><tr>
            <th>Name</th><th>Value</th><th>Members</th><th>Months</th>
            <th>Collected</th><th>Given</th><th>Savings</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>
            ${filtered.length === 0
              ? `<tr><td colspan="9" class="text-center text-slate-500 py-8">No chits yet. Click "New chit" to start.</td></tr>`
              : filtered.map((c) => `
                <tr>
                  <td class="font-medium"><a href="#/chits/${c.id}" class="text-primary hover:underline">${esc(c.name)}</a></td>
                  <td>${inr(c.total_value)}</td>
                  <td>${c.member_count} / ${c.members_count}</td>
                  <td>${esc(c.duration_months)}</td>
                  <td class="text-green-600">${inr(c.collected)}</td>
                  <td class="text-red-600">${inr(c.given)}</td>

                  <td>
                    <span class="px-2 py-1 text-xs rounded-full ${c.status === 'Ongoing'
                      ? 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-200'

    b.onclick = () => openChitForm(target, ctx, enriched.find((x) => x.id == b.dataset.edit)));

    b.onclick = async () => {
      if (!await confirm('Delete this chit, ALL its members and ALL their transactions?')) return;
      // chit_members has cascade on chit, chit_transactions has cascade on member,
      // so a single delete on chits is enough.
      const { error } = await supabase.from('chits').delete().eq('id', b.dataset.del);

      toast('Chit deleted');
      draw(target, ctx, search);

const renderChitDetails = (() => {
// Chit details — members list, monthly contributions, lucky draw.
//
// URL: #/chits/<id>


async function renderChitDetails(target, ctx) {
  const chitId = ctx.params.id;
  await draw(target, ctx, chitId);
}

async function draw(target, ctx, chitId) {
  mount(target, `<div class="text-slate-500">Loading chit…</div>`);
  const supabase = db();

  const [{ data: chit, error: chitErr },
         { data: members = [] },
         { data: txs = [] }] = await Promise.all([
    supabase.from('chits').select('*').eq('id', chitId).maybeSingle(),
    supabase.from('chit_members').select('*').eq('chit_id', chitId).order('name'),
    supabase.from('chit_transactions').select('*'),
  ]);

  if (chitErr || !chit) {
    mount(target, `
      <a href="#/chits" class="text-primary hover:underline">← Back to chits</a>
      <div class="card mt-4 text-red-600">Chit not found.</div>`);
    return;
  }

  // attach totals to each member
  const enriched = members.map((m) => {
    const ms = txs.filter((t) => t.member_id === m.id);
    const given    = ms.filter((t) => t.type === 'Given').reduce((s, t) => s + Number(t.amount), 0);
    const received = ms.filter((t) => t.type === 'Received').reduce((s, t) => s + Number(t.amount), 0);
    const lastTx   = ms.map((t) => t.date).sort().pop();
    return { ...m, given, received, lastTx };
  });

  const collected = enriched.reduce((s, m) => s + m.given, 0);
  const givenOut  = enriched.reduce((s, m) => s + m.received, 0);
  const eligible  = enriched.filter((m) => m.lottery_status === 'Pending');

  mount(target, `
    <a href="#/chits" class="text-primary hover:underline">← Back to chits</a>

      <div>

function openLottery(target, ctx, chit, eligibleAll) {
  // Step 1 — pick which of the pending members enter this draw.
  // Default: all of them.
  let chosen = new Set(eligibleAll.map((m) => m.id));

  openModal({
    title: `Lucky draw — ${chit.name}`,
    bodyHtml: `
      <p class="text-sm text-slate-500 mb-3">
        Only members who haven't won yet are eligible. Untick anyone who isn't paying this month.
      </p>
      <ul id="list" class="space-y-1 max-h-72 overflow-y-auto mb-3 p-2 border border-slate-200 dark:border-slate-700 rounded">
        ${eligibleAll.map((m) => `
          <li class="flex items-center gap-2 py-1">
            <input type="checkbox" class="h-4 w-4" data-cb="${m.id}" checked>
            <span>${esc(m.name)}</span>
          </li>`).join('')}
      </ul>
      <div class="flex justify-between items-center">
        <span id="count" class="text-sm text-slate-500">${eligibleAll.length} entered</span>
        <div>
          <button type="button" class="btn btn-ghost" data-modal-close>Cancel</button>
          <button id="go" class="btn btn-primary">Spin 🎲</button>
        </div>
      </div>
    `,
    onMount(body, close) {
      const count = body.querySelector('#count');
      body.querySelectorAll('[data-cb]').forEach((cb) => {
        cb.onchange = () => {
          if (cb.checked) chosen.add(Number(cb.dataset.cb));
          else            chosen.delete(Number(cb.dataset.cb));
          count.textContent = `${chosen.size} entered`;
        };
      });
      body.querySelector('#go').onclick = () => {
        if (chosen.size < 2) {
          toast('Pick at least two members', 'error');
          return;
        }
        const entrants = eligibleAll.filter((m) => chosen.has(m.id));
        close();
        spin(target, ctx, chit, entrants);
      };
    },
  });
}

function spin(target, ctx, chit, entrants) {
  // Step 2 — animate name shuffle, settle on a random winner.
  let winner = entrants[Math.floor(Math.random() * entrants.length)];

  openModal({
    title: 'Lucky draw in progress…',
    bodyHtml: `
      <div class="text-center py-8">
        <div class="text-sm text-slate-500 mb-3">Drumroll…</div>
        <div id="reel" class="text-4xl font-extrabold text-primary tracking-wide">${esc(entrants[0].name)}</div>
        <div id="prize" class="text-sm text-slate-500 mt-2">Prize: ${inr(chit.total_value)}</div>
      </div>
      <div class="flex justify-end gap-2">
        <button id="redo" class="btn btn-ghost" disabled>Spin again</button>
        <button id="confirm" class="btn btn-primary" disabled>Confirm winner</button>
      </div>
    `,
    onMount(body, close) {
      const reel = body.querySelector('#reel');
      const confirmBtn = body.querySelector('#confirm');
      const redoBtn = body.querySelector('#redo');

      let i = 0, interval = 60, elapsed = 0;
      const total = 2400; // ~2.4 seconds of shuffle
      const tick = () => {
        reel.textContent = entrants[i++ % entrants.length].name;
        elapsed += interval;
        if (elapsed < total) {
          // slow down towards the end
          interval = elapsed > total * 0.6 ? interval + 25 : interval;
          setTimeout(tick, interval);
        } else {
          reel.textContent = winner.name;
          reel.classList.add('animate-pulse');
          confirmBtn.disabled = false;
          redoBtn.disabled = false;
        }
      };
      tick();

      redoBtn.onclick = () => {
        winner = entrants[Math.floor(Math.random() * entrants.length)];
        reel.classList.remove('animate-pulse');
        i = 0; interval = 60; elapsed = 0;
        confirmBtn.disabled = true; redoBtn.disabled = true;
        tick();
      };

      confirmBtn.onclick = async () => {
        confirmBtn.disabled = true;
        const supabase = db();
        // 1. Mark winner as Won
        const { error: e1 } = await supabase.from('chit_members')
          .update({ lottery_status: 'Won' }).eq('id', winner.id);
        if (e1) return toast(e1.message, 'error');
        // 2. Record the prize transaction
        const { error: e2 } = await supabase.from('chit_transactions').insert([{
          member_id: winner.id,
          date: today(),
          amount: chit.total_value,
          type: 'Received',
          description: 'Monthly lottery prize'
        }]);
        if (e2) return toast(e2.message, 'error');

        toast(`${winner.name} won!`, 'success');
        close();
        draw(target, ctx, chit.id);
      };
    },
  });
}
  return renderChitDetails;
})();

    b.onclick = () => openPayForm(target, enriched.find((x) => x.id == b.dataset.pay)));
  target.querySelectorAll('[data-tx]').forEach((b) =>
    b.onclick = () => openTxList(target, enriched.find((x) => x.id == b.dataset.tx)));
  target.querySelectorAll('[data-edit]').forEach((b) =>
    b.onclick = () => openLoanForm(target, enriched.find((x) => x.id == b.dataset.edit)));
  target.querySelectorAll('[data-del]').forEach((b) => {
    b.onclick = async () => {
      if (!await confirm('Delete this loan and ALL its transactions?')) return;
      await supabase.from('loan_transactions').delete().eq('loan_id', b.dataset.del);
      const { error } = await supabase.from('loans').delete().eq('id', b.dataset.del);
      if (error) return toast(error.message, 'error');
      toast('Loan deleted');
      draw(target, search);
    };
  });
}

function openLoanForm(target, existing) {
  const isEdit = !!existing;
  openModal({
    title: isEdit ? `Edit ${existing.name}` : 'New loan',
    bodyHtml: `
      <form id="f" class="space-y-3">
        <div><label class="text-sm">Loan name</label>
             <input class="field" name="name" required value="${esc(existing?.name || '')}" placeholder="Personal loan, John, etc."></div>
        <div><label class="text-sm">Principal (₹)</label>
             <input class="field" type="number" step="0.01" name="principal" required value="${esc(existing?.principal || '')}"></div>

               <option ${existing?.type === 'Given' ? 'selected' : ''}>Given</option>
             </select></div>
        <div class="grid grid-cols-2 gap-3">

             <select class="field" name="status">
               <option ${existing?.status === 'Active' || !isEdit ? 'selected' : ''}>Active</option>
               <option ${existing?.status === 'Paid Off' ? 'selected' : ''}>Paid Off</option>
             </select></div>
        <div class="text-right pt-2">

    `,

        e.preventDefault();

          const { data, error } = await db().from('loans').insert([fd]).select();
          if (error) return toast(error.message, 'error');
          // record the original disbursement so totals make sense
          await db().from('loan_transactions').insert([{
            loan_id: data[0].id,
            date: today(),
            amount: fd.principal,
            description: 'Loan disbursement',
            type: 'Disbursement'
          }]);
        }

const renderReports = (() => {
// Reports — read-only summary across all data, with month grouping.


async function renderReports(target) {
  mount(target, `<div class="text-slate-500">Crunching numbers…</div>`);
  const supabase = db();

  const [{ data: customers = [] }, { data: custTx = [] },
         { data: expenses = [] },  { data: loans = [] },
         { data: loanTx = [] },    { data: chits = [] },
         { data: chitMembers = [] }, { data: chitTx = [] }] = await Promise.all([
    supabase.from('customers').select('*'),
    supabase.from('customer_transactions').select('*'),
    supabase.from('expenses').select('*'),
    supabase.from('loans').select('*'),
    supabase.from('loan_transactions').select('*'),
    supabase.from('chits').select('*'),
    supabase.from('chit_members').select('id, chit_id'),
    supabase.from('chit_transactions').select('*'),
  ]);

  // Per-chit roll-up
  const memberById = Object.fromEntries(chitMembers.map((m) => [m.id, m]));
  const chitStats = {};
  for (const t of chitTx) {
    const m = memberById[t.member_id];
    if (!m) continue;
    chitStats[m.chit_id] ??= { collected: 0, given: 0 };
    if (t.type === 'Given')    chitStats[m.chit_id].collected += Number(t.amount);
    if (t.type === 'Received') chitStats[m.chit_id].given     += Number(t.amount);
  }
  const chitRows = chits.map((c) => ({
    name: c.name, status: c.status,
    collected: chitStats[c.id]?.collected || 0,
    given:     chitStats[c.id]?.given     || 0,
  }));

  // Group expenses + income by YYYY-MM
  const monthly = {};
  for (const r of expenses) {
    const m = (r.expense_date || '').slice(0, 7);
    if (!m) continue;
    monthly[m] ??= { income: 0, expense: 0 };
    monthly[m][r.type === 'Income' ? 'income' : 'expense'] += Number(r.amount);
  }
  const months = Object.keys(monthly).sort().reverse().slice(0, 12);

  // Top customers by outstanding balance
  const customerStats = customers.map((c) => {
    const ct = custTx.filter((t) => t.customer_id === c.id);
    const given    = ct.filter((t) => t.type === 'Given').reduce((s, t) => s + Number(t.amount), 0);
    const received = ct.filter((t) => t.type === 'Received').reduce((s, t) => s + Number(t.amount), 0);
    return { name: c.name, balance: given - received };
  }).sort((a, b) => b.balance - a.balance).slice(0, 5);

  // Loan summary
  const loanRows = loans.map((l) => {
    const paid = loanTx.filter((t) => t.loan_id === l.id && t.type === 'Payment')
                       .reduce((s, t) => s + Number(t.amount), 0);
    return { name: l.name, type: l.type, principal: Number(l.principal), paid, balance: Number(l.principal) - paid };
  });

  // Print + CSV download helpers
  const reportTitle = `BizManager report — ${new Date().toLocaleDateString()}`;

  mount(target, `
    <div class="flex justify-between items-start flex-wrap gap-3 mb-6">
      <h1 class="text-3xl font-bold">Summary Report</h1>
      <div class="flex gap-2">
        <button id="print" class="btn btn-ghost border border-slate-300 dark:border-slate-600">🖨 Print</button>
        <button id="csv"   class="btn btn-primary">⬇ Download CSV</button>
      </div>
    </div>

    <div class="card mb-6">
      <h2 class="text-lg font-semibold mb-3">Last 12 months — income vs expense</h2>
      ${months.length === 0
        ? `<p class="text-sm text-slate-500">No expense entries yet.</p>`
        : `<div class="overflow-x-auto"><table class="tbl">
             <thead><tr><th>Month</th><th>Income</th><th>Expense</th><th>Net</th></tr></thead>
             <tbody>
               ${months.map((m) => {
                 const v = monthly[m];
                 const net = v.income - v.expense;
                 return `<tr>
                   <td>${esc(m)}</td>
                   <td class="text-green-600">${inr(v.income)}</td>
                   <td class="text-red-600">${inr(v.expense)}</td>
                   <td class="font-semibold ${net >= 0 ? 'text-green-600' : 'text-red-600'}">${inr(net)}</td>
                 </tr>`;
               }).join('')}
             </tbody>
           </table></div>`}
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="card">
        <h2 class="text-lg font-semibold mb-3">Top 5 customers by outstanding</h2>
        ${customerStats.length === 0
          ? `<p class="text-sm text-slate-500">No customers yet.</p>`
          : `<table class="tbl"><thead><tr><th>Customer</th><th>Balance</th></tr></thead>
              <tbody>${customerStats.map((c) => `
                <tr><td>${esc(c.name)}</td><td class="font-semibold">${inr(c.balance)}</td></tr>`).join('')}
              </tbody></table>`}
      </div>

      <div class="card">
        <h2 class="text-lg font-semibold mb-3">Chits</h2>
        ${chitRows.length === 0
          ? `<p class="text-sm text-slate-500">No chits yet.</p>`
          : `<table class="tbl"><thead><tr>
                <th>Name</th><th>Collected</th><th>Given</th><th>Savings</th>
              </tr></thead>
              <tbody>${chitRows.map((c) => `
                <tr>
                  <td>${esc(c.name)}</td>
                  <td class="text-green-600">${inr(c.collected)}</td>
                  <td class="text-red-600">${inr(c.given)}</td>
                  <td class="font-semibold">${inr(c.collected - c.given)}</td>
                </tr>`).join('')}
              </tbody></table>`}
      </div>

      <div class="card">
        <h2 class="text-lg font-semibold mb-3">Loans</h2>
        ${loanRows.length === 0
          ? `<p class="text-sm text-slate-500">No loans yet.</p>`
          : `<table class="tbl"><thead><tr>
                <th>Name</th><th>Type</th><th>Balance</th>
              </tr></thead>
              <tbody>${loanRows.map((l) => `
                <tr><td>${esc(l.name)}</td><td>${esc(l.type)}</td><td class="font-semibold">${inr(l.balance)}</td></tr>`).join('')}
              </tbody></table>`}
      </div>
    </div>
  `);

  target.querySelector('#print').onclick = () => {
    document.title = reportTitle;
    window.print();
  };
  target.querySelector('#csv').onclick = () => {
    const lines = [['Section', 'Key', 'Value 1', 'Value 2', 'Value 3']];
    lines.push(['Generated', reportTitle]);
    lines.push([]);
    lines.push(['Monthly', 'Month', 'Income', 'Expense', 'Net']);
    months.forEach((m) => {
      const v = monthly[m];
      lines.push(['Monthly', m, v.income, v.expense, v.income - v.expense]);
    });
    lines.push([]);
    lines.push(['Customers', 'Name', 'Balance']);
    customerStats.forEach((c) => lines.push(['Customers', c.name, c.balance]));
    lines.push([]);
    lines.push(['Loans', 'Name', 'Type', 'Principal', 'Paid', 'Balance']);
    loanRows.forEach((l) => lines.push(['Loans', l.name, l.type, l.principal, l.paid, l.balance]));

    const csv = lines.map((row) => row.map(csvCell).join(',')).join('\n');
    download(csv, `bizmanager-report-${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
  };
}

function csvCell(v) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  return /[",\n]/.test(s) ? `"${s.replaceAll('"', '""')}"` : s;
}

function download(text, filename, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
  return renderReports;
})();

        </p>
        <div class="flex flex-col sm:flex-row gap-2 sm:items-center">
          <select id="imp-table" class="field sm:max-w-xs">
            ${TABLES.map((t) => `<option>${t}</option>`).join('')}
          </select>
          <button id="dl-template" class="btn btn-ghost border border-slate-300 dark:border-slate-600">⬇ Template</button>
          <input id="imp-file" type="file" accept=".csv,text/csv"
                 class="text-sm file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-slate-100 dark:file:bg-slate-700">
          <button id="imp-go" class="btn btn-primary">Upload</button>
        </div>
        <pre id="imp-log" class="mt-3 text-xs whitespace-pre-wrap text-slate-500"></pre>
      </div>

      <!-- My account -->
      <div class="card">
        <h2 class="text-xl font-semibold mb-3">My account</h2>

        <div class="font-medium mb-3">${esc(me?.profile?.email || me?.user?.email || '')}</div>
        <div class="text-sm text-slate-500">Role</div>
        <div class="font-medium">

            : '<span class="px-2 py-0.5 text-xs rounded-full bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-200 font-semibold">customer</span> — you only see and edit your own rows.'}

    if (!creds.url) return;

      `// BizManager Lite — credentials file (LOCAL ONLY).\n` +
      `// Save this file as: credentials/config.js\n` +
      `// It is gitignored, so it will not reach GitHub.\n\n` +
      `window.BIZMGR_CONFIG = ${JSON.stringify({ url: creds.url, key: creds.key }, null, 2)};\n`;
    download(body, 'config.js', 'text/javascript');
    toast('config.js downloaded — drop it into credentials/');
  };
  $('#disconnect').onclick = async () => {
    if (!await confirm('Forget the saved Supabase URL and key on this device?')) return;
    clearCreds();
    location.hash = '';
    location.reload();
  };

  // ----- import -----
  $('#dl-template').onclick = () => {
    const t = $('#imp-table').value;
    const csv = TEMPLATES[t].join(',') + '\n';
    download(csv, `${t}-template.csv`, 'text/csv');
  };
  $('#imp-go').onclick = async () => {
    const file = $('#imp-file').files[0];
    if (!file) return toast('Pick a CSV file first', 'error');
    const text = await file.text();
    const table = $('#imp-table').value;
    const log = $('#imp-log');
    log.textContent = `Parsing ${file.name}…`;
    try {
      const rows = parseCsv(text);
      if (rows.length === 0) throw new Error('CSV has no rows.');
      const cleaned = rows.map((r) => coerceRow(table, r));
      log.textContent += `\nUploading ${cleaned.length} rows to "${table}"…`;
      const supabase = db();
      const { error } = await supabase.from(table).insert(cleaned);
      if (error) throw error;
      log.textContent += `\n✓ Done.`;
      toast(`Imported ${cleaned.length} rows`);
    } catch (e) {
      log.textContent += `\n✗ ${e.message}`;
      toast('Import failed — see details', 'error');
    }
  };

  // ----- export -----
  $('#export').onclick = async () => {
    const log = $('#backup-log');
    log.textContent = 'Reading every table…';
    const supabase = db();
    const out = { exported_at: new Date().toISOString(), version: 1, data: {} };
    for (const t of TABLES) {
      const { data, error } = await supabase.from(t).select('*');
      if (error) { log.textContent = `✗ ${t}: ${error.message}`; return; }
      out.data[t] = data;
      log.textContent += `\n${t}: ${data.length} rows`;
    }
    download(JSON.stringify(out, null, 2),
            `bizmanager-backup-${new Date().toISOString().slice(0,10)}.json`,
            'application/json');
    log.textContent += `\n✓ Backup downloaded.`;
  };

  // ----- admin: list / promote / demote users -----
  if (isAdmin) loadUsers(target, me);

  // ----- restore -----
  $('#restore').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!await confirm('Restoring will INSERT all rows from the file into your database. Continue?')) return;
    const log = $('#backup-log');
    log.textContent = `Reading ${file.name}…`;
    try {
      const obj = JSON.parse(await file.text());
      if (!obj.data) throw new Error('Not a backup file (missing "data").');
      const supabase = db();
      for (const t of TABLES) {
        const rows = obj.data[t] || [];
        if (rows.length === 0) { log.textContent += `\n${t}: skipped (empty)`; continue; }
        // strip ids so Supabase auto-assigns new ones — keeps things simple
        const { error } = await supabase.from(t).insert(rows.map(({ id, ...rest }) => rest));
        if (error) { log.textContent += `\n✗ ${t}: ${error.message}`; return; }
        log.textContent += `\n${t}: inserted ${rows.length}`;
      }
      log.textContent += `\n✓ Restore done.`;
      toast('Restore complete');
    } catch (err) {
      log.textContent += `\n✗ ${err.message}`;
    } finally {
      e.target.value = '';
    }
  };
}

  list.innerHTML = `

      const { error } = await db().from('profiles')
        .update({ role: newRole })
        .eq('id', b.dataset.toggleRole);
      if (error) return toast(error.message, 'error');
      toast('Role updated');
      loadUsers(target, me);
    };
  });
}

function openReconnect(target) {
  openModal({

    bodyHtml: `

             <input class="field" name="url" required placeholder="https://xxxxx.supabase.co"></div>

      body.querySelector('#f').onsubmit = async (e) => {

function download(text, filename, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

/** Minimal CSV parser. Handles quoted fields with commas / quotes / newlines. */
function parseCsv(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { cell += '"'; i++; }
        else inQuotes = false;
      } else cell += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(cell); cell = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (cell !== '' || row.length) { row.push(cell); rows.push(row); row = []; cell = ''; }
        if (ch === '\r' && text[i + 1] === '\n') i++;
      } else cell += ch;
    }
  }
  if (cell !== '' || row.length) { row.push(cell); rows.push(row); }
  if (rows.length < 2) return [];
  const headers = rows[0].map((h) => h.trim());
  return rows.slice(1).filter((r) => r.some((v) => v !== '')).map((r) =>
    Object.fromEntries(headers.map((h, i) => [h, r[i] === undefined ? '' : r[i].trim()]))
  );
}

/** Numeric / id columns get coerced to numbers so Supabase accepts them. */
function coerceRow(table, row) {
  const numeric = {
    customers: [],
    customer_transactions: ['customer_id', 'amount'],
    expenses: ['amount'],
    loans: ['principal', 'interest_rate', 'duration_months'],
    loan_transactions: ['loan_id', 'amount'],
    chits: ['total_value', 'members_count', 'duration_months'],
    chit_members: ['chit_id'],
    chit_transactions: ['member_id', 'amount'],
  };
  const out = { ...row };
  (numeric[table] || []).forEach((k) => {
    if (out[k] !== undefined && out[k] !== '') out[k] = Number(out[k]);
    if (out[k] === '') delete out[k];
  });
  // Drop blanks so defaults kick in
  Object.keys(out).forEach((k) => { if (out[k] === '') delete out[k]; });
  return out;
}
  return renderSettings;

// app.js — top level. Layout, hash router, auth gate, theme.


// ----- Theme: persists between sessions, defaults to system. -----
const THEME_KEY = 'bizmgr.theme';
function applyTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  const dark = saved === 'dark' ||
    (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('dark', dark);
}
applyTheme();
window.toggleTheme = () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
};

// ----- Routes -----
// `hidden: true` keeps a route reachable but out of the sidebar.
const ROUTES = [
  { path: '/',                    name: 'Home',               icon: '🏠', render: renderHome },
  { path: '/daily-business',      name: 'Daily Business',     icon: '👥', render: renderCustomers },
  { path: '/chits',               name: 'Chits',              icon: '🎟️', render: renderChits },
  { path: '/chits/:id',           name: 'Chit details',       icon: '🎟️', render: renderChitDetails, hidden: true },
  { path: '/household-expenses',  name: 'Household Expenses', icon: '💸', render: renderExpenses },
  { path: '/loans',               name: 'Loans',              icon: '🏦', render: renderLoans },
  { path: '/summary-report',      name: 'Summary Report',     icon: '📊', render: renderReports },
  { path: '/settings',            name: 'Settings',           icon: '⚙️', render: renderSettings },
];

const root = document.getElementById('app');
let me = null;        // { user, profile } or null
let unsubAuth = null; // unsubscribe from auth state changes

function currentPath() {
  const h = (location.hash || '#/').replace(/^#/, '');
  return h.startsWith('/') ? h : '/' + h;
}

/** Match a path against ROUTES. Supports `:param` segments. */
function matchRoute(path) {
  const exact = ROUTES.find((r) => r.path === path);
  if (exact) return { route: exact, params: {} };
  for (const r of ROUTES) {
    if (!r.path.includes(':')) continue;
    const re = new RegExp('^' + r.path.replace(/:([^/]+)/g, '([^/]+)') + '$');
    const m = path.match(re);
    if (m) {
      const keys = [...r.path.matchAll(/:([^/]+)/g)].map((x) => x[1]);
      const params = Object.fromEntries(keys.map((k, i) => [k, decodeURIComponent(m[i + 1])]));
      return { route: r, params };
    }
  }
  return null;
}

function shell(activePath) {
  const visible = ROUTES.filter((r) => !r.hidden);
  // Highlight the chits link even when on a chit details page
  const isOnChitDetails = activePath.startsWith('/chits/') && activePath !== '/chits';

  const links = visible.map((r) => {
    const isActive =
      activePath === r.path ||
      (r.path === '/chits' && isOnChitDetails);
    return `
      <a href="#${r.path}"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg transition
                ${isActive
                  ? 'bg-primary text-white'
                  : 'hover:bg-slate-200 dark:hover:bg-slate-700'}">
        <span class="text-lg">${r.icon}</span>
        <span class="font-medium">${esc(r.name)}</span>
      </a>`;
  }).join('');

  const role = me?.profile?.role || 'customer';
  const email = me?.profile?.email || me?.user?.email || '';
  const roleBadge = role === 'admin'
    ? '<span class="px-2 py-0.5 text-xs rounded-full bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-200 font-semibold">ADMIN</span>'
    : '<span class="px-2 py-0.5 text-xs rounded-full bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-200 font-semibold">customer</span>';

  return `
    <div class="flex min-h-screen">
      <button id="menu-btn"
              class="md:hidden fixed top-3 left-3 z-40 btn btn-ghost bg-white dark:bg-slate-800 shadow">☰</button>

      <aside id="sidebar"
             class="fixed md:static inset-y-0 left-0 z-30 w-64
                    bg-white dark:bg-slate-800 shadow-md
                    -translate-x-full md:translate-x-0 transition-transform flex flex-col">
        <div class="px-5 py-5 border-b border-slate-200 dark:border-slate-700 flex items-center gap-2">
          <div class="w-9 h-9 rounded-lg bg-primary text-white flex items-center justify-center font-bold">B</div>
          <div>
            <div class="font-bold leading-tight">BizManager</div>
            <div class="text-xs text-slate-500">Lite</div>
          </div>
        </div>
        <nav class="p-3 space-y-1 flex-1 overflow-y-auto">${links}</nav>

        <div class="p-3 border-t border-slate-200 dark:border-slate-700 space-y-2">
          <div class="text-xs text-slate-500 truncate" title="${esc(email)}">${esc(email)}</div>
          <div class="flex items-center justify-between gap-2">
            ${roleBadge}
            <button onclick="toggleTheme()" class="btn btn-ghost text-sm" title="Toggle theme">🌗</button>
          </div>
          <button id="signout-btn" class="btn btn-ghost text-sm text-red-600 w-full justify-center">Sign out</button>
        </div>
      </aside>

      <main class="flex-1 p-4 md:p-8 overflow-x-auto">
        <div id="page"></div>
      </main>
    </div>
  `;
}

async function render() {
  // 1. No URL/key yet → setup wizard
  if (!getCreds()) {
    renderSetup(root, { onDone: () => render() });
    return;
  }

  // 2. URL/key exists → check session. If none → login screen.
  try {
    me = await getMe();
  } catch (e) {
    me = null;
    console.error(e);
  }
  if (!me) {
    if (!unsubAuth) unsubAuth = onAuthChange(() => render());
    renderLogin(root, { onDone: () => render() });
    return;
  }

  // 3. Logged in → render the layout for the current route
  const path = currentPath();
  const m = matchRoute(path) || { route: ROUTES[0], params: {} };

  mount(root, shell(m.route.path));

  // mobile nav
  const sidebar = root.querySelector('#sidebar');
  root.querySelector('#menu-btn').onclick = () =>
    sidebar.classList.toggle('-translate-x-full');
  sidebar.querySelectorAll('a').forEach((a) =>
    a.addEventListener('click', () => sidebar.classList.add('-translate-x-full'))
  );

  root.querySelector('#signout-btn').onclick = async () => {
    if (!confirm('Sign out of this session?')) return;
    await signOut();
    me = null;
    render();
  };

  const pageEl = root.querySelector('#page');
  try {
    m.route.render(pageEl, {
      me,
      params: m.params,
      navigate: (p) => { location.hash = '#' + p; }
    });
  } catch (e) {
    pageEl.innerHTML = `<div class="card text-red-600">${esc(e.message)}</div>`;
    console.error(e);
  }
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);
if (document.readyState !== 'loading') render();

window.addEventListener('unhandledrejection', (e) => {
  console.error(e.reason);
  toast(e.reason?.message || 'Something went wrong.', 'error');
});
</script>
